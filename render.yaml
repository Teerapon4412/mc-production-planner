services:
  - type: web
    name: mc-production-planner
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mc-production-planner-db
          property: connectionString

databases:
  - name: mc-production-planner-db
    plan: basic-256mb
